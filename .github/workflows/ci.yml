name: CI
on:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate markdown files are non-empty
        run: |
          set -e
          for f in $(git ls-files '*.md'); do
            if [ ! -s "$f" ]; then echo "empty markdown: $f"; exit 1; fi
          done
          echo "All markdown files OK"
